services:
  backend:
    build: ./backend
    container_name: atv-onboarding-backend
    environment:
      PYTHONUNBUFFERED: "1"
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
